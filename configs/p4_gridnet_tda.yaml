# P4 = P1 with the COUNT MECHANISM swapped: sequential EDA -> parallel TDA.
# SepTDA-style (arXiv:2401.12473). Queries resolve in parallel, so errors do not
# compound down a chain the way EDA's do.
#
# Bounded by n_queries=8 -- but NOT by the training count. Trained on 2-5, it may
# still count and separate 6 speakers it never saw; that is exactly what the
# held-out 6spk eval set measures, and it is not guaranteed.
#
# Parent of P5 and P6. Slot count matches every other pipeline (8) -- do not
# override it here or P1-vs-P4 stops isolating the count mechanism.
# 4.95M params.
extends: _base.yaml
name: p4_gridnet_tda
backbone: {name: tfgridnet_lite, dim: 64, blocks: 7, hidden: 160, heads: 4}
head:     {name: tda, n_queries: 6, attr_dim: 128, layers: 2, heads: 4, ffn: 256}
