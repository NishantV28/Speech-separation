# Shared by all seven pipelines. Override ONLY backbone/head in pXX.yaml.
# Anything else moving between pipelines invalidates the comparison.
seed: 0
data:
  train: manifests/train.jsonl
  val: manifests/validation.jsonl
  test: manifests/test.jsonl
  segment: 4.0
  # UNIFORM ACROSS ALL SEVEN. Every pipeline gets the same number of output
  # slots and the same number of zero references, or a P1-vs-P4 difference
  # attributes to slot count rather than to the count mechanism.
  #
  # 4 = training max (3) + 1 headroom slot.
  #
  # This was 8, and 8 was the single biggest thing suppressing separation.
  # Slots whose reference is silence are FREE POINTS -- outputting nothing
  # satisfies them. At n_max=8 with 2-3 speakers, 5-6 of every 8 targets were
  # silence, so most of the gradient rewarded shutting up rather than
  # separating. The model took the easy win: n_est froze at ~2.9 for every true
  # count and SI-SNRi sat at ~1 dB.
  #
  # At n_max=4 with 2-3 speakers only 1-2 slots are silence, so the loss can
  # only go down by actually separating. The headroom slot still teaches the
  # model to stop (a 2spk window leaves 2 slots empty).
  n_max: 4
  drop_clipped: true
  # Train on 2 and 3 speakers ONLY. This is SepTDA's protocol (arXiv:2401.12473)
  # -- the state of the art trains on exactly 2+3 and tests beyond.
  #
  # Spreading a 5M model and 3k mixtures across 2-5 speakers gave ~1 dB on ALL
  # of them. The brief requires >=3 speakers "for the very least"; four broken
  # counts is worth less than one that works. 2spk also bootstraps 3spk -- the
  # model already reaches 7 dB there when it is not starved.
  #
  # The model is still never TOLD the count -- it infers 2 or 3 itself. Unknown
  # is not the same as unbounded, and this project is about unknown.
  train_counts: [2, 3]
  val_counts: [2, 3]
stft:
  n_fft: 256
  hop: 128
train:
  steps: 100000
  # MICRO-batch. Keep EFFECTIVE batch (batch x grad_accum) identical across all
  # pipelines or the comparison is confounded by optimisation, not architecture.
  # Measured on RTX 3050 4GB, MossFormer2, 4s clips, FULL training step:
  #   batch  8: 0.48 s/step  1.27G  16.8 samples/s
  #   batch 16: 0.72 s/step  2.31G  22.2 samples/s   <- best
  #   batch 24: 1.87 s/step  3.35G  12.8 samples/s   <- CLIFF: spills to system
  #   batch 32: 3.88 s/step  4.41G   8.2 samples/s      RAM, 3x slower, NO ERROR
  # Past 16 you exceed ~3.45GB usable and Windows silently spills over PCIe.
  # On a 16GB T4, raise it.
  batch: 16
  grad_accum: 1     # effective batch = 16 for every pipeline
  lr: 1.0e-3
  warmup: 4000
  clip: 5.0
  amp: auto         # auto = bf16 on Ampere, fp16+scaler on Turing. Never hardcode.
  grad_ckpt: false
  ckpt_every: 500
loss:
  snr_max_db: 30.0
  mixture_consistency: true
  exist_weight: 0.1        # BCE on the existence/stop head
  conf_weight: 0.0         # P5 only
  ecapa_weight: 0.0        # P5 only -- needs speechbrain; NOT installed, silently skips
  # --- the two additions. Both default OFF, so every other pipeline is the
  # --- clean control and P5's delta is attributable.
  overlap_alpha: 0.0       # 0 = uniform SI-SNR, exactly as before
  repulsion_weight: 0.0
  repulsion_margin: 0.0
eval:
  counts: [2, 3]
  extrapolation_counts: [4]    # NEVER TRAINED -- the scaling claim, SepTDA-style
  gate_db: -25.0
  # Clips are 10s but training crops to `segment`. Eval crops to the same length
  # by default: a model trained at 4s has never seen positional embeddings past
  # frame 501, so evaluating on a full 10s clip would use untrained positions.
  # `--full` chunks instead (what separate.py does for the demo).
  crop_to_segment: true
