# P6 = P4 + temporal attractor memory. Isolates cross-chunk speaker identity.
#
# Every other pipeline generates attractors per chunk independently, so on a 60s
# meeting speaker A is slot 2 in one chunk and slot 0 in the next, and vanishes
# if they pause. Separation can be perfect per chunk and the output still
# useless. P6 carries attractors forward through a GRU, so slot i is the same
# person throughout, and a speaker who goes quiet decays instead of disappearing.
#
# The only STREAMABLE pipeline, and the only one that survives inputs longer
# than its training segment. The graders' inputs will be longer than 4s.
# 5.05M params.
extends: _base.yaml
name: p6_tda_memory
backbone: {name: tfgridnet_lite, dim: 64, blocks: 7, hidden: 160, heads: 4}
head:     {name: tda_memory, n_queries: 6, attr_dim: 128, layers: 2, heads: 4, ffn: 256, mem_gate: true}
train:
  chunks_per_step: 3     # truncated BPTT over consecutive chunks
