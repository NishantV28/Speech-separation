# P3 = P1 with the BACKBONE SWAPPED -- the one backbone experiment left.
# GridNet-FSMN: TF-GridNet's dual-path TF grid, but with the sub-band BLSTM
# replaced by FSMN (a parallel depthwise conv over time).
#
# Asks: does TF-GridNet's grid topology beat MossFormer2's single sequence, once
# the grid's LSTM bottleneck is removed?
#
# Why FSMN instead of plain TF-GridNet: TF-GridNet's sub-band BLSTM runs a
# length-T scan per frequency and is the whole reason it is unusable here.
# Measured at 2s/batch1: TF-GridNet 3826ms, GridNet-FSMN 559ms -- 6.8x faster at
# equal params. That result is itself a contribution.
#
# Savings spent on WIDTH, not depth: the first attempt spent them on depth
# (7->14 blocks) and was NOT faster (4012ms), because every block still holds the
# intra-frame BLSTM -- doubling depth doubled the recurrence we KEPT while
# removing the one we replaced.
extends: _base.yaml
name: p3_gridfsmn_eda
backbone: {name: gridnet_fsmn, dim: 96, blocks: 7, hidden: 224, heads: 4, l_order: 20, r_order: 20, fsmn_layers: 2}
head:     {name: eda, n_max: 8, attr_dim: 128, max_speakers: 10}
